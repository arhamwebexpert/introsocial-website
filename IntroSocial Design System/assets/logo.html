<!DOCTYPE html>
<!-- IntroSocial brand mark — the lowercase italic "i" in a blue circle.
     CSS-drawn (there is no logo file in the product). Two canonical
     sizes: 40px (navbar) and 60px (login). Wordmark is lowercase,
     weight 800, brand blue. -->
<html lang="en">
<head>
<meta charset="utf-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;800;900&display=swap');
  body{margin:0;background:#18191a;color:#e4e6eb;font-family:'Inter',sans-serif;
       display:flex;gap:3rem;align-items:center;justify-content:center;min-height:100vh;flex-wrap:wrap;}
  .mark{display:flex;align-items:center;justify-content:center;background:#1877f2;color:#fff;
        border-radius:50%;font-weight:900;font-style:italic;letter-spacing:-1px;}
  .mark-40{width:40px;height:40px;font-size:1.25rem;}
  .mark-60{width:60px;height:60px;font-size:1.875rem;}
  .lockup{display:flex;align-items:center;gap:.5rem;}
  .wordmark{font-size:1.375rem;font-weight:800;color:#1877f2;}
  .stack{display:flex;flex-direction:column;align-items:center;gap:.75rem;}
  .cap{font-size:.75rem;color:#8a8d91;}
</style>
</head>
<body>
  <div class="stack">
    <div class="lockup">
      <div class="mark mark-40">i</div>
      <span class="wordmark">introsocial</span>
    </div>
    <span class="cap">Navbar lockup · 40px mark</span>
  </div>
  <div class="stack">
    <div class="mark mark-60">i</div>
    <span class="cap">Login mark · 60px</span>
  </div>
</body>
</html>
