<!-- @dsCard group="Components" -->
<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="row" style="gap:10px">
  <span style="font-size:12px;padding:3px 9px;border-radius:12px;background:rgba(255,201,71,.12);color:#ffc947;border:1px solid rgba(255,201,71,.25)">🔒 Private</span>
  <span style="font-size:12px;padding:3px 9px;border-radius:12px;background:rgba(66,183,42,.12);color:#42b72a;border:1px solid rgba(66,183,42,.25)">🌐 Public</span>
  <span style="font-size:12px;padding:3px 9px;border-radius:12px;background:rgba(24,119,242,.12);color:#1877f2;border:1px solid rgba(24,119,242,.25)">💬 From thread</span>
  <span style="font-size:12px;font-weight:600;padding:3px 10px;border-radius:20px;background:rgba(0,0,0,.6);color:#fff;backdrop-filter:blur(4px)">👥 12</span>
</div>
<div class="cap">Badges = ~12% tinted fill + ~25% tinted border, with a leading emoji. Member count is a translucent blurred pill.</div>
</body></html>
