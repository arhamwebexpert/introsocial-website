<!-- @dsCard group="Colors" -->
<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="grid" style="grid-template-columns:repeat(6,1fr)">
  <div class="swatch"><div class="sw" style="background:#1877f2"></div><div class="cap"><b style="color:var(--fb-text-secondary)">blue</b><br><span class="hex">#1877F2</span></div></div>
  <div class="swatch"><div class="sw" style="background:#166fe5"></div><div class="cap"><b style="color:var(--fb-text-secondary)">blue-hover</b><br><span class="hex">#166FE5</span></div></div>
  <div class="swatch"><div class="sw" style="background:#42b72a"></div><div class="cap"><b style="color:var(--fb-text-secondary)">green</b><br><span class="hex">#42B72A</span></div></div>
  <div class="swatch"><div class="sw" style="background:#f02849"></div><div class="cap"><b style="color:var(--fb-text-secondary)">red</b><br><span class="hex">#F02849</span></div></div>
  <div class="swatch"><div class="sw" style="background:#25d366"></div><div class="cap"><b style="color:var(--fb-text-secondary)">wa-green</b><br><span class="hex">#25D366</span></div></div>
  <div class="swatch"><div class="sw" style="background:#ffc947"></div><div class="cap"><b style="color:var(--fb-text-secondary)">amber</b><br><span class="hex">#FFC947</span></div></div>
</div>
</body></html>
