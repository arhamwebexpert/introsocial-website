<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  button{font-family:inherit;cursor:pointer;border:none;font-weight:600;}
  .pri{background:#1877f2;color:#fff;padding:10px 18px;border-radius:8px;font-size:15px;}
  .sec{background:#3a3b3c;color:#e4e6eb;padding:10px 18px;border-radius:8px;font-size:15px;}
  .grn{background:#42b72a;color:#fff;padding:10px 18px;border-radius:8px;font-size:15px;font-weight:700;}
  .dis{background:#1877f2;color:#fff;padding:10px 18px;border-radius:8px;font-size:15px;opacity:.6;}
</style></head>
<body>
<div class="row" style="gap:12px">
  <button class="pri">Log In</button>
  <button class="sec">Secondary</button>
  <button class="grn">Create new account</button>
  <button class="dis">Disabled</button>
</div>
<div class="cap">Primary blue · neutral grey · green for create/success · disabled = 0.6 opacity. Press shrinks to scale(0.98).</div>
</body></html>
