<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>.toast{display:flex;align-items:center;gap:10px;background:#242526;color:#e4e6eb;padding:12px 18px;border-radius:10px;font-size:15px;font-weight:500;box-shadow:0 4px 20px rgba(0,0,0,.5);min-width:200px}
.dot{width:20px;height:20px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;flex-shrink:0}</style></head>
<body>
<div class="col" style="gap:9px">
  <div class="toast" style="border-left:3px solid #42b72a"><span class="dot" style="background:#42b72a">✓</span>Group created successfully</div>
  <div class="toast" style="border-left:3px solid #f02849"><span class="dot" style="background:#f02849">✕</span>Invalid invite code</div>
  <div class="toast" style="border-left:3px solid #1877f2"><span class="dot" style="background:#1877f2">ℹ</span>You joined the group</div>
</div>
</body></html>
