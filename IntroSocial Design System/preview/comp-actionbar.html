<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body>
<div style="background:#242526;border-radius:10px;overflow:hidden;max-width:360px">
  <div style="border-top:1px solid #3a3b3c;display:flex;padding:4px 8px">
    <button style="flex:1;display:flex;align-items:center;justify-content:center;gap:6px;padding:8px;border:none;background:none;color:#1877f2;font-weight:600;font-size:15px;font-family:inherit;cursor:pointer">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M14 9V5a3 3 0 00-3-3l-4 9v11h11.28a2 2 0 002-1.7l1.38-9a2 2 0 00-2-2.3H14z"/><path d="M7 22H4a2 2 0 01-2-2v-7a2 2 0 012-2h3"/></svg>Liked</button>
    <button style="flex:1;display:flex;align-items:center;justify-content:center;gap:6px;padding:8px;border:none;background:none;color:#b0b3b8;font-weight:600;font-size:15px;font-family:inherit;cursor:pointer">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>Comment</button>
  </div>
</div>
<div class="cap">Moment action bar — divider on top, two equal-weight buttons. Liked = blue + filled icon; idle = muted + outline.</div>
</body></html>
