<!-- @dsCard group="Brand" -->
<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  /* Speech-bubble mark: the brand blue chat bubble with one corner
     tucked to a tail — the product's own bubble silhouette. */
  .bubble{display:flex;align-items:center;justify-content:center;
    background:linear-gradient(135deg,#1877f2,#0d5dbf);color:#fff;
    font-weight:900;font-style:italic;letter-spacing:-1px;
    box-shadow:0 2px 8px rgba(24,119,242,.4);}
  .b40{width:40px;height:40px;font-size:20px;border-radius:14px 14px 14px 3px;}
  .b60{width:60px;height:60px;font-size:30px;border-radius:20px 20px 20px 5px;}
</style></head>
<body>
<div class="row" style="gap:30px">
  <div class="row" style="gap:11px">
    <div class="bubble b40">i</div>
    <span style="font-size:22px;font-weight:800;color:#1877f2">introsocial</span>
  </div>
  <div class="bubble b60">i</div>
</div>
<div class="cap">The mark is a <b style="color:var(--fb-text-secondary)">chat bubble</b> — italic <b style="color:var(--fb-text-secondary)">i</b> in the brand-blue gradient, one corner tucked to a tail (the product's own bubble shape). Wordmark stays lowercase, 800, brand blue.</div>
</body></html>
