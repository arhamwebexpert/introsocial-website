<!-- @dsCard group="Colors" -->
<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="col" style="gap:14px">
  <div class="row" style="gap:10px">
    <span style="color:#e4e6eb;font-size:26px;font-weight:700">Primary text</span>
    <span class="hex">#E4E6EB</span>
  </div>
  <div class="row" style="gap:10px">
    <span style="color:#b0b3b8;font-size:18px;font-weight:500">Secondary — subtitles &amp; idle nav</span>
    <span class="hex">#B0B3B8</span>
  </div>
  <div class="row" style="gap:10px">
    <span style="color:#8a8d91;font-size:15px">Muted — timestamps, placeholders</span>
    <span class="hex">#8A8D91</span>
  </div>
  <div class="row" style="gap:10px">
    <span style="background:#1877f2;color:#fff;font-size:13px;font-weight:600;padding:3px 10px;border-radius:6px">White on blue</span>
    <span class="hex">#FFFFFF</span>
  </div>
</div>
</body></html>
