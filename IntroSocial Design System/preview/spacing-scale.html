<!-- @dsCard group="Spacing" -->
<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="row" style="gap:10px;align-items:flex-end">
  <div class="col" style="align-items:center;gap:6px"><div style="width:4px;height:32px;background:#1877f2"></div><span class="cap" style="margin:0">1·4</span></div>
  <div class="col" style="align-items:center;gap:6px"><div style="width:8px;height:32px;background:#1877f2"></div><span class="cap" style="margin:0">2·8</span></div>
  <div class="col" style="align-items:center;gap:6px"><div style="width:12px;height:32px;background:#1877f2;opacity:.85"></div><span class="cap" style="margin:0">3·12</span></div>
  <div class="col" style="align-items:center;gap:6px"><div style="width:16px;height:32px;background:#1877f2;opacity:.7"></div><span class="cap" style="margin:0">4·16</span></div>
  <div class="col" style="align-items:center;gap:6px"><div style="width:20px;height:32px;background:#1877f2;opacity:.55"></div><span class="cap" style="margin:0">5·20</span></div>
  <div class="col" style="align-items:center;gap:6px"><div style="width:24px;height:32px;background:#1877f2;opacity:.4"></div><span class="cap" style="margin:0">6·24</span></div>
</div>
<div class="cap">4px base unit. <b style="color:var(--fb-text-secondary)">12px</b> is the workhorse gap between cards; <b style="color:var(--fb-text-secondary)">16px</b> is card padding.</div>
</body></html>
