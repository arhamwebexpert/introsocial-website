<!-- @dsCard group="Spacing" -->
<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="row" style="gap:26px;align-items:flex-start">
  <!-- WhatsApp-style bubble radius story (the hero) -->
  <div class="col" style="gap:8px">
    <div style="display:flex;flex-direction:column;gap:7px;min-width:230px">
      <div style="align-self:flex-start;max-width:80%;background:#1c1e22;color:#fff;font-size:13px;padding:8px 12px;border-radius:16px 16px 16px 4px">Are we still on for Friday?</div>
      <div style="align-self:flex-end;max-width:80%;background:linear-gradient(135deg,#1877f2,#0d5dbf);color:#fff;font-size:13px;padding:8px 12px;border-radius:16px 16px 4px 16px;box-shadow:0 2px 8px rgba(24,119,242,.4)">Yes! Bringing the camera 📸</div>
    </div>
    <span class="cap" style="margin:0">Chat bubbles · <b style="color:var(--fb-text-secondary)">16px</b>, sender corner tucked to <b style="color:var(--fb-text-secondary)">4px</b> to point at the speaker</span>
  </div>
  <!-- the rest of the radius scale -->
  <div class="col" style="gap:10px">
    <div class="row" style="gap:14px;align-items:flex-end">
      <div class="col" style="align-items:center;gap:6px"><div style="width:54px;height:40px;background:#3a3b3c;border-radius:8px"></div><span class="capb">8</span><span class="cap" style="margin:0">btn/input</span></div>
      <div class="col" style="align-items:center;gap:6px"><div style="width:54px;height:40px;background:#3a3b3c;border-radius:12px"></div><span class="capb">12</span><span class="cap" style="margin:0">card</span></div>
      <div class="col" style="align-items:center;gap:6px"><div style="width:70px;height:30px;background:#3a3b3c;border-radius:24px"></div><span class="capb">20–24</span><span class="cap" style="margin:0">pill/field</span></div>
      <div class="col" style="align-items:center;gap:6px"><div style="width:40px;height:40px;background:linear-gradient(135deg,#1877f2,#0d47a1);border-radius:50%"></div><span class="capb">50%</span><span class="cap" style="margin:0">avatar</span></div>
    </div>
  </div>
</div>
</body></html>
