<!-- @dsCard group="Colors" -->
<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="grid" style="grid-template-columns:repeat(3,1fr)">
  <div class="swatch"><div class="sw" style="background:linear-gradient(135deg,#1877f2,#0d47a1)"></div><div class="cap"><b style="color:var(--fb-text-secondary)">avatar</b> · 135°<br><span class="hex">#1877F2 → #0D47A1</span></div></div>
  <div class="swatch"><div class="sw" style="background:linear-gradient(135deg,#1877f2 0%,#0d5dbf 100%)"></div><div class="cap"><b style="color:var(--fb-text-secondary)">bubble / send</b><br><span class="hex">#1877F2 → #0D5DBF</span></div></div>
  <div class="swatch"><div class="sw" style="background:linear-gradient(135deg,#1c2d5a 0%,#1877f2 50%,#0d3b8e 100%)"></div><div class="cap"><b style="color:var(--fb-text-secondary)">group cover</b><br><span class="hex">3-stop blue</span></div></div>
</div>
</body></html>
