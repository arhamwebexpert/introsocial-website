<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="row" style="gap:22px">
  <div class="col" style="align-items:center;gap:9px"><div style="width:90px;height:54px;background:#242526;border-radius:10px;box-shadow:0 1px 2px rgba(0,0,0,.3),0 2px 8px rgba(0,0,0,.2)"></div><span class="cap" style="margin:0">card rest</span></div>
  <div class="col" style="align-items:center;gap:9px"><div style="width:90px;height:54px;background:#242526;border-radius:10px;box-shadow:0 4px 16px rgba(0,0,0,.4)"></div><span class="cap" style="margin:0">hover-lift</span></div>
  <div class="col" style="align-items:center;gap:9px"><div style="width:90px;height:54px;background:#242526;border-radius:10px;box-shadow:0 4px 20px rgba(0,0,0,.5)"></div><span class="cap" style="margin:0">toast</span></div>
  <div class="col" style="align-items:center;gap:9px"><div style="width:90px;height:54px;background:linear-gradient(135deg,#1877f2,#0d5dbf);border-radius:14px;box-shadow:0 2px 8px rgba(24,119,242,.4)"></div><span class="cap" style="margin:0">bubble glow</span></div>
</div>
</body></html>
